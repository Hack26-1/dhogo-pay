<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Dhogo Pay</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

<div class="bg"></div>

<div class="card">

  <h1>
    Dhogo Pay
  </h1>

  <p class="subtitle">
    Fast & Secure EcoCash Payments
  </p>

  <input
    type="text"
    id="phone"
    placeholder="Enter EcoCash Number"
  >

  <button onclick="payNow()">
    Pay $1
  </button>

  <p id="status"></p>

  <div class="footer">
    Powered By Takunda Ngonisa
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
